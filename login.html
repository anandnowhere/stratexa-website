<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <link rel="canonical" href="https://www.stratexa.in/login.html" />
    <title>Stratexa | Client Login</title>
    <meta name="description" content="Secure login to your Stratexa automated trading dashboard.">
    <meta name="author" content="Stratexa" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.stratexa.in/login.html" />
    <meta property="og:title" content="Stratexa | Client Login" />
    <meta property="og:description" content="Secure login to your Stratexa automated trading dashboard." />
    <meta property="og:image" content="https://www.stratexa.in/og-image.png" />

    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://www.stratexa.in/login.html" />
    <meta property="twitter:title" content="Stratexa | Client Login" />
    <meta property="twitter:description" content="Secure login to your Stratexa automated trading dashboard." />
    <meta property="twitter:image" content="https://www.stratexa.in/og-image.png" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <style>
      :root {
        --bg-primary: #070a12;
        --accent-green: #10b981;
        --accent-green-bright: #34d399;
        --accent-green-glow: rgba(16, 185, 129, 0.2);
        --text-primary: #f3f4f6;
        --text-secondary: #9ca3af;
        --border-color: rgba(255, 255, 255, 0.08);
        --glass-bg: rgba(17, 24, 39, 0.92);
        --glass-border: rgba(255, 255, 255, 0.1);
        --logo-stroke: #ffffff;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-primary);
        background-image: 
          radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.08) 0px, transparent 50%),
          radial-gradient(at 100% 0%, rgba(6, 182, 212, 0.06) 0px, transparent 50%);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .portal-container { width: 100%; max-width: 420px; }

      .glass-card {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        backdrop-filter: blur(16px);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
        padding: 40px 32px;
        width: 100%;
        transition: border-color 0.3s ease;
      }

      .glass-card:hover { border-color: rgba(16, 185, 129, 0.25); }

      .logo-area {
        display: flex; flex-direction: column;
        align-items: center; gap: 16px; margin-bottom: 36px;
      }

      .logo-icon-container {
        width: 60px; height: 60px;
        display: flex; align-items: center; justify-content: center;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 14px; border: 1px solid var(--border-color);
      }

      .official-logo-svg { width: 34px; height: 34px; }
      .logo-text { display: flex; flex-direction: column; align-items: center; }

      .brand-name {
        font-family: 'Outfit', sans-serif;
        font-size: 1.9rem; font-weight: 800;
        letter-spacing: 0.05em; line-height: 1.1;
      }

      .brand-tagline {
        font-size: 0.5rem; font-weight: 700;
        color: var(--accent-green-bright);
        letter-spacing: 0.14em; margin-top: 4px;
        text-transform: uppercase;
      }

      .form-title {
        font-family: 'Outfit', sans-serif;
        font-size: 1.15rem; font-weight: 600;
        margin-bottom: 6px; text-align: center;
      }

      .form-sub {
        font-size: 0.82rem; color: var(--text-secondary);
        text-align: center; margin-bottom: 28px; line-height: 1.5;
      }

      .form-group {
        margin-bottom: 18px;
        display: flex; flex-direction: column; gap: 7px;
      }

      .form-group label {
        font-size: 0.82rem; color: var(--text-secondary); font-weight: 500;
      }

      .input-wrapper {
        position: relative; display: flex; align-items: center;
      }

      .input-wrapper i {
        position: absolute; left: 15px;
        color: var(--text-secondary); font-size: 0.95rem;
      }

      .input-wrapper input {
        width: 100%;
        background: rgba(10, 14, 26, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px; color: var(--text-primary);
        padding: 13px 16px 13px 42px; font-size: 0.95rem;
        outline: none; transition: border-color 0.2s, box-shadow 0.2s;
        font-family: 'Inter', sans-serif;
      }

      .input-wrapper input:focus {
        border-color: var(--accent-green);
        box-shadow: 0 0 12px rgba(16, 185, 129, 0.25);
      }

      .btn {
        width: 100%; padding: 13px;
        background: var(--accent-green); color: #000;
        border: none; border-radius: 8px;
        font-family: 'Outfit', sans-serif;
        font-size: 1rem; font-weight: 700;
        cursor: pointer; display: flex;
        align-items: center; justify-content: center; gap: 8px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 14px var(--accent-green-glow);
        text-decoration: none; margin-top: 4px;
      }

      .btn:hover {
        background: var(--accent-green-bright);
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(16, 185, 129, 0.35);
      }

      .error-box {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 8px; color: #f87171;
        padding: 12px; font-size: 0.84rem;
        margin-bottom: 18px; display: none;
        align-items: center; gap: 8px;
      }

      .error-box.active { display: flex; }

      .back-link {
        display: inline-flex; align-items: center; gap: 8px;
        color: var(--text-secondary); text-decoration: none;
        font-size: 0.85rem; margin-top: 24px;
        justify-content: center; width: 100%;
        transition: color 0.2s;
      }

      .back-link:hover { color: var(--text-primary); }

      .footer-note {
        text-align: center; margin-top: 20px;
        font-size: 0.72rem; color: rgba(156, 163, 175, 0.5);
        line-height: 1.5;
      }

      /* --- Modal Overlay --- */
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(6px);
        z-index: 9999;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }

      .modal-overlay.active { display: flex; }

      .modal-container {
        width: 100%;
        max-width: 1100px;
        height: 85vh;
        background: #0f1724;
        border: 1px solid rgba(16, 185, 129, 0.3);
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7);
        display: flex;
        flex-direction: column;
        position: relative;
      }

      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 20px;
        background: #0a0f1a;
        border-bottom: 1px solid var(--border-color);
        flex-shrink: 0;
      }

      .modal-header-left {
        display: flex;
        align-items: center;
        gap: 10px;
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        font-size: 0.9rem;
      }

      .modal-header-left .status-dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: var(--accent-green-bright);
        box-shadow: 0 0 8px var(--accent-green-bright);
      }

      .modal-close-btn {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #f87171;
        padding: 6px 14px;
        border-radius: 6px;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        font-family: 'Inter', sans-serif;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .modal-close-btn:hover {
        background: rgba(239, 68, 68, 0.25);
      }

      .modal-body {
        flex: 1;
        overflow: hidden;
      }

      .modal-body iframe {
        width: 100%;
        height: 100%;
        border: none;
      }

      .modal-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        gap: 16px;
        color: var(--text-secondary);
        font-size: 0.9rem;
      }

      .modal-loading .spinner-lg {
        width: 36px; height: 36px;
        border: 3px solid rgba(255,255,255,0.1);
        border-left-color: var(--accent-green-bright);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      @media (max-width: 768px) {
        .modal-container {
          max-width: 100%;
          height: 92vh;
          border-radius: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="portal-container">
      <div class="glass-card">
        <div class="logo-area">
          <div class="logo-icon-container">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="official-logo-svg">
              <path d="M25 75L75 25M75 25H45M75 25V55" stroke="#10b981" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M25 45V75H55" stroke="var(--logo-stroke)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="logo-text">
            <span class="brand-name">STRATEXA.IN</span>
            <span class="brand-tagline">AUTOMATE. EXECUTE. ELEVATE.</span>
          </div>
        </div>

        <h3 class="form-title">Client Login</h3>
        <p class="form-sub">Sign in to access your live trading terminal.</p>

        <div id="error-message" class="error-box">
          <i class="fa-solid fa-circle-exclamation"></i>
          <span id="error-text"></span>
        </div>

        <form id="portal-form">
          <div class="form-group">
            <label for="client-id">Username</label>
            <div class="input-wrapper">
              <i class="fa-solid fa-user"></i>
              <input type="text" id="client-id" required placeholder="Enter your username" autofocus autocomplete="username" />
            </div>
          </div>

          <div class="form-group">
            <label for="client-password">Password</label>
            <div class="input-wrapper">
              <i class="fa-solid fa-lock"></i>
              <input type="password" id="client-password" required placeholder="Enter your password" autocomplete="current-password" />
            </div>
          </div>

          <button type="submit" class="btn">
            <span>Sign In</span>
            <i class="fa-solid fa-arrow-right"></i>
          </button>
        </form>

        <a href="/" class="back-link">
          <i class="fa-solid fa-arrow-left"></i>
          <span>Back to Homepage</span>
        </a>

        <div class="footer-note">
          Protected by end-to-end encryption.<br>
          For access, contact your account manager.
        </div>
      </div>
    </div>

    <!-- Terminal Modal Overlay -->
    <div id="terminal-modal" class="modal-overlay">
      <div class="modal-container">
        <div class="modal-header">
          <div class="modal-header-left">
            <span class="status-dot"></span>
            <span id="modal-title">STRATEXA Live Terminal</span>
          </div>
          <button class="modal-close-btn" onclick="closeTerminal()">
            <i class="fa-solid fa-xmark"></i> Close Terminal
          </button>
        </div>
        <div class="modal-body" id="modal-body">
          <div class="modal-loading" id="modal-loading">
            <div class="spinner-lg"></div>
            <span>Connecting to terminal server...</span>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Obfuscated client-to-server mapping
      const C = {
        'anand': 'aHR0cDovLzMuMTA4LjE5LjczOjgwODA=',
        'mohan': 'aHR0cDovLzE2NS4yMzIuMTg2LjIyNzo4MDAw'
      };

      function d(s) { return atob(s); }

      const form = document.getElementById('portal-form');
      const errorBox = document.getElementById('error-message');
      const errorText = document.getElementById('error-text');
      const modal = document.getElementById('terminal-modal');
      const modalBody = document.getElementById('modal-body');
      const modalTitle = document.getElementById('modal-title');
      const modalLoading = document.getElementById('modal-loading');

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        errorBox.classList.remove('active');

        const username = document.getElementById('client-id').value.trim().toLowerCase();
        const password = document.getElementById('client-password').value;

        if (!username || username.length < 2) {
          errorText.textContent = 'Please enter a valid username.';
          errorBox.classList.add('active');
          return;
        }

        if (!password) {
          errorText.textContent = 'Please enter your password.';
          errorBox.classList.add('active');
          return;
        }

        if (!(username in C)) {
          errorText.textContent = 'Invalid credentials. Please try again or contact support.';
          errorBox.classList.add('active');
          return;
        }

        // Open terminal in popup window (keeps stratexa.in URL in main tab)
        const serverUrl = d(C[username]);
        modalTitle.textContent = `STRATEXA Live Terminal — ${username.charAt(0).toUpperCase() + username.slice(1)}`;
        
        // Try iframe first, fallback to popup window
        openTerminal(serverUrl, username);
      });

      function openTerminal(serverUrl, username) {
        // Show modal with loading state
        modal.classList.add('active');
        modalLoading.style.display = 'flex';

        // Open in a new popup window (avoids mixed content / CORS)
        // URL bar is visible but the main stratexa.in tab stays intact
        const w = screen.width * 0.85;
        const h = screen.height * 0.85;
        const left = (screen.width - w) / 2;
        const top = (screen.height - h) / 2;

        const popup = window.open(
          serverUrl,
          'stratexa_terminal',
          `width=${w},height=${h},left=${left},top=${top},menubar=no,toolbar=no,location=no,status=no,scrollbars=yes,resizable=yes`
        );

        if (popup) {
          // Popup opened successfully — close our modal
          setTimeout(() => {
            modal.classList.remove('active');
          }, 1500);

          // Monitor if popup is closed
          const check = setInterval(() => {
            if (popup.closed) {
              clearInterval(check);
              modal.classList.remove('active');
            }
          }, 1000);
        } else {
          // Popup blocked — fallback to direct navigation
          modalLoading.innerHTML = `
            <i class="fa-solid fa-shield-halved" style="font-size: 2rem; color: var(--accent-green-bright);"></i>
            <span>Popup blocked by browser.</span>
            <a href="${serverUrl}" target="_blank" class="btn" style="width: auto; padding: 10px 24px; margin-top: 8px; text-decoration: none;">
              <i class="fa-solid fa-arrow-up-right-from-square"></i> Open Terminal in New Tab
            </a>
          `;
        }
      }

      function closeTerminal() {
        modal.classList.remove('active');
        // Reset loading state for next open
        modalLoading.style.display = 'flex';
        modalLoading.innerHTML = `
          <div class="spinner-lg"></div>
          <span>Connecting to terminal server...</span>
        `;
      }

      // Close modal on Escape key
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && modal.classList.contains('active')) {
          closeTerminal();
        }
      });
    </script>
  </body>
</html>
